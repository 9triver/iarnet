services:
  # Iarnet 服务（前后端一体化）
  iarnet:
    image: iarnet:latest
    container_name: iarnet
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      # 挂载数据目录（持久化）
      - ./data:/app/data
      # 挂载工作空间目录
      - ./workspaces:/app/workspaces
      # 可选：挂载配置文件（如果需要自定义配置）
      - ./config.yaml:/app/config.yaml:ro
    ports:
      - "3000:3000"  # 前端 Next.js 端口
      - "8083:8083"  # 后端 HTTP API 端口
    networks:
      - iarnet-network
    restart: unless-stopped
    environment:
      # 后端 URL（前端使用）
      - BACKEND_URL=http://localhost:8083
      # Docker host
      - DOCKER_HOST=unix:///var/run/docker.sock
    cap_add:
      - SYS_TIME
    command: >
      sh -c "
      CURRENT_HOUR=$$(date +%H);
      CURRENT_MIN=$$(date +%M);
      CURRENT_SEC=$$(date +%S);
      date 1219$${CURRENT_HOUR}$${CURRENT_MIN}2025.$${CURRENT_SEC} || true;
      echo '[启动脚本] 系统时间已设置为: '$$(date);
      exec /app/entrypoint.sh
      "
    labels:
      - "app.name=iarnet"
      - "app.type=fullstack"

networks:
  iarnet-network:
    driver: bridge
    name: iarnet-network

